name = "storyglobal"
main = "src/worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "story_worlds_db"
database_id = "0649d910-55c8-4afe-8d8d-91d7429bb5b9"
migrations_dir = "migrations"

# Secrets (set via `wrangler secret put <NAME>`, do not put real values here):
#   RESEND_API_KEY   - for sending magic-link emails
#   SESSION_SECRET   - random string used to sign session tokens
#
# AI-authored content comes in via the MCP endpoint (see /@dm!n/mcp for docs
# and token management) rather than a built-in provider — connect Claude,
# ChatGPT, or any MCP-capable client with a generated token.
