name = "story-world"
main = "src/worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "story_worlds_db"
database_id = "0649d910-55c8-4afe-8d8d-91d7429bb5b9"
migrations_dir = "migrations"

[ai]
binding = "AI"

# Secrets (set via `wrangler secret put <NAME>`, do not put real values here):
#   RESEND_API_KEY      - for sending magic-link emails
#   SESSION_SECRET      - random string used to sign session tokens
#   GROQ_API_KEY_1..N    - free-tier Groq keys, used for AI age-rating
#                          classification, tried after Workers AI (see [ai]
#                          binding above)
#   GEMINI_API_KEY_1..N  - free-tier Gemini keys, tried after Groq keys
#   AION_API_KEY_1..N    - last-resort fallback, tried ONLY when Workers AI/
#                          Groq/Gemini all refuse to classify a story on
#                          policy/safety grounds (not for quota/network
#                          failures, which the Groq->Gemini chain already
#                          covers)
#
# There is no in-house translation feature — readers can use their browser's
# built-in page-translate capability instead.
#
# AI-authored content comes in via the MCP endpoint (see /@dm!n/mcp for docs
# and token management) rather than a built-in provider — connect Claude,
# ChatGPT, or any MCP-capable client with a generated token.

[observability]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
